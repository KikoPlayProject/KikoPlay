name: Build and Package KikoPlay

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  QT_VERSION: "6.8.3"
  BUILD_TYPE: "Release"

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - artifact_name: kikoplay-amd64
            arch: amd64
            qt_arch: linux_gcc_64
          - artifact_name: kikoplay-arm64
            arch: arm64
            qt_arch: linux_gcc_arm64

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libmpv-dev \
          ffmpeg \
          libprotobuf-dev \
          pkgconf \
          libxkbcommon-x11-dev \
          libxcb-cursor-dev \
          libminizip-dev \
          libevent-dev \
          liblua5.3-dev \
          libfuse2 \
          desktop-file-utils

    - name: Install ONNX Runtime
      run: |
        # Download and install ONNX Runtime from GitHub releases
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-x64-1.22.0.tgz
          tar -xzf onnxruntime-linux-x64-1.22.0.tgz
          sudo cp -r onnxruntime-linux-x64-1.22.0/lib/* /usr/lib/
          sudo cp -r onnxruntime-linux-x64-1.22.0/include/* /usr/include/
        else
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-aarch64-1.22.0.tgz
          tar -xzf onnxruntime-linux-aarch64-1.22.0.tgz
          sudo cp -r onnxruntime-linux-aarch64-1.22.0/lib/* /usr/lib/
          sudo cp -r onnxruntime-linux-aarch64-1.22.0/include/* /usr/include/
        fi

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        arch: ${{ matrix.qt_arch }}
        target: 'desktop'
        modules: 'qtpositioning qtwebchannel qtwebengine qtwebsockets qtwaylandcompositor'

    - name: Create secrets header
      run: |
        cat > Common/secrets.h << 'EOF'
        #undef APP_ID_KIKO
        #undef APP_SECRET_KIKO
        #undef APP_ID_DANDAN
        #undef APP_SECRET_DANDAN
        
        #define APP_ID_KIKO "${{ secrets.APP_ID_KIKO }}"
        #define APP_SECRET_KIKO "${{ secrets.APP_SECRET_KIKO }}"
        #define APP_ID_DANDAN "${{ secrets.APP_ID_DANDAN }}"
        #define APP_SECRET_DANDAN "${{ secrets.APP_SECRET_DANDAN }}"
        EOF

    - name: Build main application
      run: |
        qmake6 build.pro
        make -j$(nproc)

    - name: Package .deb
      run: |
        make INSTALL_ROOT=$PWD/debian install

        # Get version from git tag or use default
        if [ -n "${{ github.ref_name }}" ] && echo "${{ github.ref_name }}" | grep -q '^[0-9]'; then
            VERSION="${{ github.ref_name }}"
        else
            VERSION="2.0.0"
        fi

        # Update version and architecture in control file
        sed -i "s/^Version:.*/Version: ${VERSION}/" debian/DEBIAN/control
        sed -i "s/^Architecture:.*/Architecture: ${{ matrix.arch }}/" debian/DEBIAN/control

        dpkg-deb --build --root-owner-group debian kikoplay-${{ matrix.arch }}.deb

    - name: Full Package
      run: |
        sed -i "s/^Depends:.*/Depends: /" debian/DEBIAN/control

        if [ "${{ matrix.arch }}" = "amd64" ]; then
          wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          mv linuxdeployqt-continuous-x86_64.AppImage linuxdeployqt.AppImage
          chmod a+x linuxdeployqt.AppImage
        else
          wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-aarch64.AppImage
          mv linuxdeployqt-continuous-aarch64.AppImage linuxdeployqt.AppImage
          chmod a+x linuxdeployqt.AppImage
        fi

        mkdir -p debian/usr/share/doc/libc6/
        touch debian/usr/share/doc/libc6/copyright

        ./linuxdeployqt.AppImage \
          debian/usr/share/applications/io.github.KikoPlayProject.KikoPlay.desktop \
          -appimage \
          -unsupported-allow-new-glibc \
          -exclude-libs=libqsqlmimer,libmysqlclient,libqsqlmysql,libqsqlpsql,libqsqlodbc,libqtposition_nmea

        if [ "${{ matrix.arch }}" = "amd64" ]; then
          mv KikoPlay-*x86_64.AppImage kikoplay-${{ matrix.arch }}-full.AppImage
        else
          mv KikoPlay-*aarch64.AppImage kikoplay-${{ matrix.arch }}-full.AppImage
        fi

        rm -r debian/usr/share/doc
        rm debian/{.DirIcon,AppRun,io.github.KikoPlayProject.KikoPlay.desktop,io.github.KikoPlayProject.KikoPlay.png}

        mkdir -p debian/opt/kikoplay
        mv debian/usr/{bin,lib,libexec,plugins,resources,translations} debian/opt/kikoplay
        desktop-file-edit \
          --set-key=Exec \
          --set-value=/opt/kikoplay/bin/KikoPlay \
          debian/usr/share/applications/io.github.KikoPlayProject.KikoPlay.desktop
        dpkg-deb --build --root-owner-group debian kikoplay-${{ matrix.arch }}-full.deb

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          kikoplay-${{ matrix.arch }}.deb
          kikoplay-${{ matrix.arch }}-full.deb
          kikoplay-${{ matrix.arch }}-full.AppImage

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          kikoplay-${{ matrix.arch }}.deb
          kikoplay-${{ matrix.arch }}-full.deb
          kikoplay-${{ matrix.arch }}-full.AppImage
        draft: false
        prerelease: false

  build-macos:
    runs-on: macos-14
    env:
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Checkout scripts repository
      uses: actions/checkout@v5
      with:
        repository: KikoPlayProject/KikoPlayScript
        path: KikoPlayScript

    - name: Install system dependencies
      run: |
        brew update
        brew install pkgconf mpv onnxruntime aria2 dylibbundler protobuf@21

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        arch: clang_64
        target: desktop
        modules: 'qtpositioning qtwebchannel qtwebengine qtwebsockets'

    - name: Import signing certificate
      if: ${{ env.MACOS_SIGNING_IDENTITY != '' }}
      env:
        MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
        echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
        security create-keychain -p "" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "" "$KEYCHAIN_PATH"
        security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
        security find-identity -v "$KEYCHAIN_PATH"

    - name: Create secrets header
      run: |
        cat > Common/secrets.h << 'EOF'
        #undef APP_ID_KIKO
        #undef APP_SECRET_KIKO
        #undef APP_ID_DANDAN
        #undef APP_SECRET_DANDAN

        #define APP_ID_KIKO "${{ secrets.APP_ID_KIKO }}"
        #define APP_SECRET_KIKO "${{ secrets.APP_SECRET_KIKO }}"
        #define APP_ID_DANDAN "${{ secrets.APP_ID_DANDAN }}"
        #define APP_SECRET_DANDAN "${{ secrets.APP_SECRET_DANDAN }}"
        EOF

    - name: Build application
      run: |
        qmake build.pro CONFIG+=release
        make -j3

    - name: Bundle macOS app
      run: |
        mkdir -p KikoPlay.app/Contents/MacOS/extension/script
        cp -R KikoPlayScript/danmu KikoPlayScript/match KikoPlayScript/library KikoPlayScript/resource KikoPlayScript/bgm_calendar KikoPlay.app/Contents/MacOS/extension/script/

        macdeployqt KikoPlay.app
        ONNX_LIB="$(find /opt/homebrew/opt/onnxruntime/lib -name 'libonnxruntime*.dylib' | head -n 1)"
        PROTOBUF_LIB="$(find /opt/homebrew/opt/protobuf@21/lib /opt/homebrew/opt/protobuf/lib -name 'libprotobuf*.dylib' 2>/dev/null | head -n 1)"
        MPV_LIB="$(find /opt/homebrew/opt/mpv/lib /opt/homebrew/lib -name 'libmpv*.dylib' 2>/dev/null | head -n 1)"
        mkdir -p bundled-libs
        dylibbundler -od -b \
          -x "$ONNX_LIB" \
          -x "$PROTOBUF_LIB" \
          -x "$MPV_LIB" \
          -d bundled-libs \
          -p @executable_path/../Frameworks \
          -s /opt/homebrew/lib \
          -s /opt/homebrew/opt/onnxruntime/lib \
          -s /opt/homebrew/opt/re2/lib \
          -s /opt/homebrew/opt/protobuf@21/lib \
          -s /opt/homebrew/opt/protobuf/lib \
          -s /opt/homebrew/opt/abseil/lib \
          -s /opt/homebrew/opt/mpv/lib
        cp -R bundled-libs/. KikoPlay.app/Contents/Frameworks/
        install_name_tool -change "$ONNX_LIB" "@executable_path/../Frameworks/$(basename "$ONNX_LIB")" KikoPlay.app/Contents/MacOS/KikoPlay || true
        install_name_tool -change "$PROTOBUF_LIB" "@executable_path/../Frameworks/$(basename "$PROTOBUF_LIB")" KikoPlay.app/Contents/MacOS/KikoPlay || true
        install_name_tool -change "$MPV_LIB" "@executable_path/../Frameworks/$(basename "$MPV_LIB")" KikoPlay.app/Contents/MacOS/KikoPlay || true
        if [ -n "$MACOS_SIGNING_IDENTITY" ]; then
          codesign --force --deep --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" KikoPlay.app
        else
          codesign --force --deep --sign - KikoPlay.app
        fi
        mkdir dmg-root
        cp -R KikoPlay.app dmg-root/
        ln -s /Applications dmg-root/Applications
        hdiutil create -volname KikoPlay -srcfolder dmg-root -ov -format UDZO kikoplay-macos-arm64.dmg
        if [ -n "$MACOS_SIGNING_IDENTITY" ]; then
          codesign --force --timestamp --sign "$MACOS_SIGNING_IDENTITY" kikoplay-macos-arm64.dmg
        fi

    - name: Notarize macOS package
      if: ${{ env.MACOS_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
      run: |
        xcrun notarytool submit kikoplay-macos-arm64.dmg \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait
        xcrun stapler staple kikoplay-macos-arm64.dmg

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kikoplay-macos-arm64
        path: kikoplay-macos-arm64.dmg

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: kikoplay-macos-arm64.dmg
        draft: false
        prerelease: false
